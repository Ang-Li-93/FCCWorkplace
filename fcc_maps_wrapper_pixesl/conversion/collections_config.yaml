# collections_config.yaml
# -----------------------
# Candidate SimTrackerHit collections to convert, in priority order. The
# converter picks the FIRST collection present in the input file unless the
# user overrides with --collection.
#
# For ALLEGRO o1_v03 the silicon wrapper barrel collection is "SiWrBCollection"
# (disks are "SiWrDCollection"). The other names are kept as fallbacks for
# different geometry versions / custom MAPS wrappers.

input:
  simhit_collections:
    - SiWrBCollection        # ALLEGRO silicon wrapper BARREL (primary target)
    - SiWrDCollection        # ALLEGRO silicon wrapper DISKS
    - MAPSWrapperBarrelHits   # custom MAPS wrapper (geometry/MAPSWrapper_o1_v00.xml)
    - SiWrapperBarrelHits
    - TrackerBarrelHits
    - SimTrackerHits

output:
  pixesl_csv: outputs/pixesl_hits_zinclusive.csv
